name: Check Lottery Winner

on:
  # Ejecutar manualmente desde GitHub
  workflow_dispatch:
    inputs:
      date:
        description: 'Fecha del sorteo (YYYY-MM-DD), vacío = hoy'
        required: false

  # La rifa juega el sábado 15 de agosto de 2026 con la Lotería de Boyacá.
  # Esa noche en Colombia (7pm-11:55pm, UTC-5) corresponde al 16 de agosto
  # de 00:00 a 04:55 UTC. El cron solo corre esa madrugada UTC, cada 5 min.
  # (El script además tiene una guardia: no escribe antes del 2026-08-15.)
  schedule:
    - cron: '*/5 0-4 16 8 *'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Create .env
        run: |
          echo 'GOOGLE_SPREADSHEET_ID=${{ secrets.GOOGLE_SPREADSHEET_ID }}' > .env

      - name: Check lottery results
        run: node scripts/check-winner.js ${{ github.event.inputs.date || '' }}
